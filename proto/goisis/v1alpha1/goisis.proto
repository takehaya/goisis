syntax = "proto3";

package goisis.v1alpha1;

// IsisService is the management API for goisisd. It stays in v1alpha1 until
// the TLV/LSDB data model stabilizes; expect breaking changes before v1.
service IsisService {
  // GetIsis returns instance-wide daemon state.
  rpc GetIsis(GetIsisRequest) returns (GetIsisResponse);
  // ListCircuits lists the configured circuits.
  rpc ListCircuits(ListCircuitsRequest) returns (ListCircuitsResponse);
  // ListAdjacencies lists IS-IS adjacencies across all circuits.
  rpc ListAdjacencies(ListAdjacenciesRequest) returns (ListAdjacenciesResponse);
  // GetLsdb returns the link-state database.
  rpc GetLsdb(GetLsdbRequest) returns (GetLsdbResponse);
  // ListRoutes returns the computed routes (the RIB).
  rpc ListRoutes(ListRoutesRequest) returns (ListRoutesResponse);
  // ListLocators lists the SRv6 locators this node advertises.
  rpc ListLocators(ListLocatorsRequest) returns (ListLocatorsResponse);
  // ListFlexAlgos lists Flexible Algorithm state (elected definitions and
  // participating nodes) per level.
  rpc ListFlexAlgos(ListFlexAlgosRequest) returns (ListFlexAlgosResponse);
  // AddLocator advertises a new SRv6 locator at runtime.
  rpc AddLocator(AddLocatorRequest) returns (AddLocatorResponse);
  // DeleteLocator withdraws a previously advertised SRv6 locator.
  rpc DeleteLocator(DeleteLocatorRequest) returns (DeleteLocatorResponse);
  // AddFlexAlgo makes this node participate in a Flexible Algorithm at runtime.
  rpc AddFlexAlgo(AddFlexAlgoRequest) returns (AddFlexAlgoResponse);
  // DeleteFlexAlgo stops this node participating in a Flexible Algorithm.
  rpc DeleteFlexAlgo(DeleteFlexAlgoRequest) returns (DeleteFlexAlgoResponse);
  // WatchEvent streams adjacency and route changes as they happen.
  rpc WatchEvent(WatchEventRequest) returns (stream WatchEventResponse);
}

message GetIsisRequest {}

message GetIsisResponse {
  Global global = 1;
}

// Global is instance-wide state of the goisisd process.
message Global {
  // version is the goisisd build version.
  string version = 1;
  // system_id is the IS-IS system identifier, dotted (e.g. 0000.0000.0001).
  string system_id = 2;
}

// Level is an IS-IS level.
enum Level {
  LEVEL_UNSPECIFIED = 0;
  LEVEL_1 = 1;
  LEVEL_2 = 2;
}

// Circuit is one configured IS-IS circuit.
message Circuit {
  string interface = 1;
  bool point_to_point = 2;
  bool level1 = 3;
  bool level2 = 4;
  uint32 priority = 5;
  uint32 metric = 6;
}

// Adjacency is one IS-IS adjacency.
message Adjacency {
  string interface = 1;
  Level level = 2;
  string system_id = 3;
  string snpa = 4;
  string state = 5; // Down, Init, Up
  uint32 priority = 6;
  uint32 holding_time = 7;
}

// Lsp is one entry in the link-state database.
message Lsp {
  Level level = 1;
  string lsp_id = 2;
  uint32 sequence_number = 3;
  uint32 remaining_lifetime = 4;
  uint32 checksum = 5;
  bool own = 6;
}

// NextHop is one resolved next hop for a route.
message NextHop {
  string interface = 1;
  string gateway = 2;
}

// Route is one computed route.
message Route {
  string prefix = 1;
  uint32 metric = 2;
  Level level = 3;
  repeated NextHop next_hops = 4;
  // algorithm is the IGP algorithm the route was computed under: 0 = normal
  // SPF, 128-255 = Flexible Algorithm (RFC 9350).
  uint32 algorithm = 5;
}

// Locator is an SRv6 locator advertised by this node.
message Locator {
  string prefix = 1;
  // algorithm is 0 (normal SPF) or a Flexible Algorithm (128-255).
  uint32 algorithm = 2;
  // end_sid is the local End SID instantiated at the locator's base address.
  string end_sid = 3;
}

// FlexAlgoDefinition is the elected Flexible Algorithm Definition (RFC 9350).
message FlexAlgoDefinition {
  // metric_type: 0 = IGP, 1 = min unidirectional link delay, 2 = TE.
  uint32 metric_type = 1;
  uint32 calc_type = 2;
  uint32 priority = 3;
  // advertiser is the System ID of the node whose definition won the election.
  string advertiser = 4;
}

// FlexAlgo is one Flexible Algorithm's state at a level.
message FlexAlgo {
  uint32 algorithm = 1;
  Level level = 2;
  // definition is the elected FAD, unset if no node advertises one.
  FlexAlgoDefinition definition = 3;
  // participants are the System IDs participating in this algorithm.
  repeated string participants = 4;
}

message ListCircuitsRequest {}
message ListCircuitsResponse {
  repeated Circuit circuits = 1;
}

message ListAdjacenciesRequest {}
message ListAdjacenciesResponse {
  repeated Adjacency adjacencies = 1;
}

message GetLsdbRequest {}
message GetLsdbResponse {
  repeated Lsp lsps = 1;
}

message ListRoutesRequest {}
message ListRoutesResponse {
  repeated Route routes = 1;
}

message ListLocatorsRequest {}
message ListLocatorsResponse {
  repeated Locator locators = 1;
}

message ListFlexAlgosRequest {}
message ListFlexAlgosResponse {
  repeated FlexAlgo flex_algos = 1;
}

message AddLocatorRequest {
  // prefix is the IPv6 locator prefix (e.g. fc00:0:1::/48).
  string prefix = 1;
  // algorithm is 0 (normal SPF) or a Flexible Algorithm (128-255) the node must
  // already participate in.
  uint32 algorithm = 2;
}
message AddLocatorResponse {}

message DeleteLocatorRequest {
  // prefix identifies the advertised locator to withdraw (matched masked).
  string prefix = 1;
}
message DeleteLocatorResponse {}

message AddFlexAlgoRequest {
  // algorithm is the Flexible Algorithm number (128-255).
  uint32 algorithm = 1;
  // metric_type: 0 = IGP, 1 = min unidirectional link delay, 2 = TE.
  uint32 metric_type = 2;
  // priority is this node's advertised priority for the winner election.
  uint32 priority = 3;
  // advertise_definition controls whether this node advertises the FAD.
  bool advertise_definition = 4;
}
message AddFlexAlgoResponse {}

message DeleteFlexAlgoRequest {
  // algorithm is the Flexible Algorithm number to stop participating in.
  uint32 algorithm = 1;
}
message DeleteFlexAlgoResponse {}

message WatchEventRequest {}

message WatchEventResponse {
  oneof event {
    AdjacencyEvent adjacency = 1;
    RouteEvent route = 2;
  }
}

// AdjacencyEvent reports an adjacency state change.
message AdjacencyEvent {
  Adjacency adjacency = 1;
}

// RouteEvent reports a route addition/change (withdrawn=false) or removal
// (withdrawn=true).
message RouteEvent {
  Route route = 1;
  bool withdrawn = 2;
}
