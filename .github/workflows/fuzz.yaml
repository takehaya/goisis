name: fuzz

on:
  schedule:
    # Nightly at 18:00 UTC.
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzDecodePDU
          - FuzzDecodeTLVs
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Fuzz ${{ matrix.target }}
        run: go test -run '^$' -fuzz '^${{ matrix.target }}$' -fuzztime 10m ./pkg/packet/
      - name: Upload crashers
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-corpus-${{ matrix.target }}
          path: pkg/packet/testdata/fuzz/
          if-no-files-found: ignore
