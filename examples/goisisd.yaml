# Example goisisd configuration. Run: goisisd -f goisisd.yaml
#
# The NET encodes the area address and the 6-octet system ID (the last octet,
# the NSEL, must be 00).
net: 49.0001.0000.0000.0001.00
hostname: r1

# Program computed routes into the Linux kernel FIB (proto isis). Requires
# CAP_NET_ADMIN. Omit or set false to run control-plane only (e.g. when
# consuming routes via the WatchEvent API into your own dataplane).
fib: true

# Set the overload bit for this long after startup, then clear it, so peers
# route no transit traffic through this node until routes have settled.
# overload-on-startup: 30s

# HMAC authentication of LSPs/SNPs. area-password covers Level 1, domain-password
# covers Level 2. The algorithm defaults to HMAC-MD5 (RFC 5304, interops with
# FRR's area-password/domain-password md5); set *-auth-algorithm to an HMAC-SHA
# variant (RFC 5310, goisis<->goisis) with a *-key-id.
# area-password: s3cret
# domain-password: s3cret
# area-auth-algorithm: sha256   # md5 (default) | sha1 | sha256 | sha384 | sha512
# area-key-id: 1

circuits:
  - interface: eth0
    level: "12"     # "1", "2", or "12" (default "12")
    # p2p: true     # point-to-point instead of broadcast/LAN
    # priority: 64  # DIS election priority on a LAN (0-127)
    # metric: 10    # circuit wide metric
    # hello-password: s3cret   # HMAC-MD5 hello authentication (RFC 5304)

# Static prefixes to originate (connected subnets of the circuits above are
# advertised automatically).
prefixes:
  - 10.1.1.1/32
  - 2001:db8:1::1/128

# SRv6 locators (RFC 9352). Each is advertised in the SRv6 Locator TLV with a
# local End SID at its base address; with fib:true that End SID is installed as
# a seg6local route.
srv6:
  locators:
    - fc00:0:1::/48

# Flexible Algorithms (RFC 9350). The node participates in each listed algo
# (advertised in the SR-Algorithm sub-TLV); set advertise:true to also originate
# the definition (FAD). An optional per-algo SRv6 locator binds a locator to the
# algorithm so its route is computed over that algorithm's pruned topology.
flex-algo:
  - algo: 128
    metric-type: igp   # igp (default), delay, or te
    priority: 100
    advertise: true
    locator: fc00:0:128::/48
