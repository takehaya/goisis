name: interop

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

# Continuous interop against FRR isisd: every push/PR forms adjacencies
# between goisis and a real FRR over a veth pair (broadcast and p2p).
jobs:
  frr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Pull images
        run: |
          docker pull quay.io/frrouting/frr:10.6.1
          docker pull alpine:3.22
      - name: Build interop tests
        run: go test -c -o /tmp/interop.test ./test/interop
      - name: Run interop (needs root for AF_PACKET + veth; PATH kept for `go`)
        run: sudo env "PATH=$PATH" /tmp/interop.test -test.v -test.timeout 12m
