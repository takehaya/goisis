version: 2

project_name: goisis

builds:
  - id: goisisd
    main: ./cmd/goisisd
    binary: goisisd
    env:
      - CGO_ENABLED=0
    # The daemon is Linux-only: it opens AF_PACKET sockets and programs the
    # netlink FIB (pkg/config references unix.RT_TABLE_MAIN / fib.NewNetlink).
    # The CLI below stays cross-platform.
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/takehaya/goisis/internal/version.Version={{.Version}}
  - id: goisis
    main: ./cmd/goisis
    binary: goisis
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/takehaya/goisis/internal/version.Version={{.Version}}

archives:
  # One archive per binary so each has a consistent binary count across
  # platforms (goisisd is Linux-only; goisis is cross-platform). A single
  # archive of both fails: linux would carry two binaries, darwin one.
  - id: goisisd
    ids:
      - goisisd
    formats:
      - tar.gz
    name_template: "goisisd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: goisis
    ids:
      - goisis
    formats:
      - tar.gz
    name_template: "goisis_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  prerelease: auto

dockers_v2:
  - id: goisis
    ids:
      - goisisd
      - goisis
    dockerfile: Dockerfile
    images:
      - ghcr.io/takehaya/goisis
    tags:
      - "{{ .Version }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
